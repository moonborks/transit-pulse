services:
  valkey:
    container_name: valkey
    image: valkey/valkey:latest
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    container_name: postgres
    image: postgres:latest
    shm_size: 128mb
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
      target: final
    container_name: transit-pulse_backend
    image: transit-pulse/backend:latest
    environment:
      APP_ENV: production
      DATABASE_URL: postgres://user:pass@postgres:5432/db?sslmode=disable
      VALKEY_URL: valkey:6379
    depends_on:
      valkey:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
      target: final
    container_name: transit-pulse_frontend
    image: transit-pulse/frontend:latest
    depends_on:
      - backend
    ports:
      - 8080:80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:r
